<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Table Layout</title>
</head>
<body>

<table border="1" width="100%" height="600">

    <!-- Header -->
    <tr>
        <td colspan="3" align="center">
            <h2>My Dashboard</h2>
        </td>
    </tr>

    <!-- Main Row -->
    <tr>

        <!-- Sidebar -->
        <td width="20%" valign="top">
            <ul>
                <li>Home</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </td>

        <!-- Main Content -->
        <td width="60%" valign="top">
            <h3>Main Content</h3>
            <p>This is the central panel.</p>
        </td>

        <!-- Extra Panel -->
        <td width="20%" valign="top">
            <h3>Extra Panel</h3>
            <p>Additional info here.</p>
        </td>

    </tr>

    <!-- Footer -->
    <tr>
        <td colspan="3" align="center">
            Footer information
        </td>
    </tr>

</table>

</body>
</html>
