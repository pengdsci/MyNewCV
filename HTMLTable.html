<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Table Layout</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    table {
        width: 100%;
        height: 100vh;
        border-collapse: collapse;
    }

    td {
        vertical-align: top;
        padding: 15px;
    }

    /* Header */
    .header {
        background-color: #2d1b3d;
        color: white;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        height: 80px;
    }

    /* Sidebar */
    .sidebar {
        background-color: #6E3061;
        color: white;
        width: 20%;
    }

    /* Main content */
    .main {
        background-color: #d3d3d3;
        width: 60%;
    }

    /* Right panel */
    .extra {
        background-color: #bfbfbf;
        width: 20%;
    }

    /* Footer */
    .footer {
        background-color: #2d1b3d;
        color: white;
        text-align: center;
        height: 50px;
    }

    ul {
        padding-left: 20px;
    }
</style>
</head>
<body>

<table>
    <!-- Header -->
    <tr>
        <td colspan="3" class="header">My Dashboard</td>
    </tr>

    <!-- Main Row -->
    <tr>
        <!-- Sidebar -->
        <td class="sidebar">
            <ul>
                <li>Home</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </td>

        <!-- Main Content -->
        <td class="main">
            <h2>Main Content</h2>
            <p>This is the central panel.</p>
        </td>

        <!-- Extra Panel -->
        <td class="extra">
            <h3>Extra Panel</h3>
            <p>Additional info here.</p>
        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td colspan="3" class="footer">Footer information</td>
    </tr>
</table>

</body>
</html>
