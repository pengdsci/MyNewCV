<!DOCTYPE html>
<html>
<head>
    <title>Multi-Panel Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Dashboard</h1>
</header>

<div class="container">
    <nav class="sidebar">
        <ul>
            <li>Home</li>
            <li>Profile</li>
            <li>Settings</li>
        </ul>
    </nav>

    <main class="content">
        <h2>Main Content</h2>
        <p>This is the central panel.</p>
    </main>

    <aside class="panel">
        <h3>Extra Panel</h3>
        <p>Additional info here.</p>
    </aside>
</div>

<footer>
    <p>Footer information</p>
</footer>

</body>
</html>
